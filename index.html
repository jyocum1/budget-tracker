<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, doc, onSnapshot, setDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyANG-kYcZrW86BplwMubf4CkLqiiOWMODE",
  authDomain: "budget-tracker-99497.firebaseapp.com",
  projectId: "budget-tracker-99497",
  storageBucket: "budget-tracker-99497.firebasestorage.app",
  messagingSenderId: "770594927410",
  appId: "1:770594927410:web:5ec5d02dd5ba9197c01d2b"
};

// Only this Google account may read or write the budget data -- must match
// the Firestore security rule exactly.
const ALLOWED_EMAIL = "janet.yocum@gmail.com";

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const auth = getAuth(fbApp);
const provider = new GoogleAuthProvider();
const dataDocRef = doc(db, "budgetTracker", "data");

try {
  await enableIndexedDbPersistence(db);
} catch (e) {
  console.warn("Firestore offline persistence not enabled:", e && e.code);
}

let authReadyResolve;
const authReady = new Promise(res => { authReadyResolve = res; });

// React may mount after the first auth-status event fires -- keep the latest
// status on window so AuthGate can read it directly instead of missing it.
window.__lastAuthStatus = { status: "checking" };
window.addEventListener("auth-status", e => {
  window.__lastAuthStatus = e.detail;
});

window.startGoogleSignIn = function () {
  signInWithRedirect(auth, provider).catch(err => {
    console.error("Sign-in redirect failed:", err);
    window.dispatchEvent(new CustomEvent("auth-status", {
      detail: { status: "error", error: String(err) }
    }));
  });
};

window.signOutOfBudgetTracker = function () {
  signOut(auth).catch(err => console.error("Sign-out failed:", err));
};

// Resolves the account when landing back from the Google redirect flow.
getRedirectResult(auth).catch(err => {
  console.error("Redirect result error:", err);
  window.dispatchEvent(new CustomEvent("auth-status", {
    detail: { status: "error", error: String(err) }
  }));
});

onAuthStateChanged(auth, user => {
  if (!user) {
    window.dispatchEvent(new CustomEvent("auth-status", { detail: { status: "signed-out" } }));
    return;
  }
  if (user.email !== ALLOWED_EMAIL) {
    // Signed into the wrong Google account -- deny and sign back out immediately.
    signOut(auth);
    window.dispatchEvent(new CustomEvent("auth-status", {
      detail: { status: "denied", email: user.email }
    }));
    return;
  }
  window.dispatchEvent(new CustomEvent("auth-status", {
    detail: { status: "signed-in", email: user.email }
  }));
  authReadyResolve();
});

let saveTimer = null;
window.firestoreSave = function (categories, transactions) {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    authReady.then(() => {
      setDoc(dataDocRef, {
        categories,
        transactions,
        updatedAt: Date.now()
      }).catch(err => console.error("Firestore save failed:", err));
    });
  }, 400);
};

window.firestoreInit = function () {
  if (window.__firestoreListening) return;
  window.__firestoreListening = true;
  authReady.then(() => {
    onSnapshot(dataDocRef, snap => {
      if (snap.exists()) {
        window.dispatchEvent(new CustomEvent("firestore-data", { detail: snap.data() }));
      } else {
        window.dispatchEvent(new CustomEvent("firestore-empty"));
      }
    }, err => {
      console.error("Firestore listen failed:", err);
      window.dispatchEvent(new CustomEvent("firestore-error", { detail: err }));
    });
  });
};

window.firestoreReadyFlag = true;
window.dispatchEvent(new CustomEvent("firestore-ready"));
</script>
